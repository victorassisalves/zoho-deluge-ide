<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoho Deluge Advanced IDE v2.0.0</title>

    <!-- CSS Segmentation: Core Theme & Layout -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/layout.css">

    <!-- CSS Segmentation: Components -->
    <link rel="stylesheet" href="styles/components/buttons.css">
    <link rel="stylesheet" href="styles/components/modals.css">
    <link rel="stylesheet" href="styles/components/tabs.css">
    <link rel="stylesheet" href="styles/components/panels.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Third-party CSS -->
    <link rel="stylesheet" href="modules/explorer/explorer.css">
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="../assets/monaco-editor/min/vs/editor/editor.main.css">
</head>
<body>
    <div id="app-container">
        <!-- Header Shell -->
        <header id="top-bar">
            <div class="logo" style="display: flex; align-items: center; color: var(--md-sys-color-primary); font-weight: bold; font-size: var(--md-sys-typescale-title-small);">
                Deluge IDE
                <div class="project-info" style="margin-left: 20px; display: inline-flex; align-items: center; gap: 5px;">
                    <label style="font-size: 10px; color: var(--md-sys-color-on-surface-variant);">Project:</label>
                    <input type="text" id="project-name-input" placeholder="Untitled Project" style="background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); border: 1px solid var(--md-sys-color-outline-variant); padding: 2px 5px; font-size: var(--md-sys-typescale-body-medium); width: 150px; border-radius: var(--md-sys-shape-corner-extra-small);">
                </div>
            </div>
            <div class="actions">
                <span id="status-indicator">Disconnected</span>
                <!-- SVG icons injected via JS for actions where applicable, but buttons defined here to maintain bindings -->
                <button id="link-tab-btn" title="Link Active Zoho Tab">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg> Link Tab
                </button>
                <button id="new-btn" title="New Script">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> New
                </button>
                <button id="pull-btn" title="Pull (Ctrl+Shift+P)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Pull
                </button>
                <button id="push-btn" title="Sync (Ctrl+Shift+S)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg> Sync
                </button>
                <button id="toggle-right-sidebar-top" title="Toggle Interface Manager">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                </button>
                <button id="interface-btn" title="JSON to Deluge Map">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M22 18v-2H8V4h2L7 1 4 4h2v2H2v2h4v10h10v2h-2l3 3 3-3h-2v-2h4zM10 8h6v6h2V8c0-1.1-.9-2-2-2h-6v2z"/></svg> JSON->Map
                </button>
                <button id="execute-btn" title="Sync + Execute (Ctrl+Shift+Enter)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Run
                </button>
                <button id="save-btn" title="Save Locally (Ctrl+S)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg> Save
                </button>
            </div>
        </header>

        <!-- Main Content Shell -->
        <main id="main-content">
            <!-- Left Sidebar Navigation -->
            <aside id="sidebar">
                <!-- Rendered by app/ui/index.js -> components/sidebar.js -->
            </aside>

            <!-- Left Panel Content -->
            <div id="left-panel-content" class="sidebar-panel">
                <!-- Rendered by app/ui/index.js -> components/left-panel.js -->
            </div>
            <div id="left-resizer" class="resizer"></div>

            <!-- Monaco Editor Container -->
            <div id="editor-container"></div>

            <!-- Right Sidebar (Interface Manager) -->
            <div id="right-sidebar-resizer" class="resizer"></div>
            <aside id="right-sidebar">
                <!-- Rendered by app/ui/index.js -> components/right-panel.js -->
            </aside>
        </main>

        <!-- Bottom Panel Shell -->
        <div id="bottom-resizer" class="resizer horizontal"></div>
        <footer id="bottom-panel">
            <!-- Rendered by app/ui/index.js -> components/bottom-panel.js -->
        </footer>

        <!-- Status Bar -->
        <div id="status-bar">
            <div class="status-left">
                <span id="sync-status">Ready</span>
                <span id="cursor-pos">Ln 1, Col 1</span>
            </div>
            <div class="status-right">
                <span>Deluge</span>
            </div>
        </div>
    </div>

    <!-- Modals Container -->
    <div id="modals-container">
        <!-- Rendered by app/ui/index.js -> components/modals.js -->
    </div>

    <!-- Scripts -->
    <script src="../assets/monaco-editor/min/vs/loader.js"></script>
    <!-- Boot sequence loads UI synchronously before main logic -->
    <script type="module" src="loader.js"></script>
</body>
</html>
